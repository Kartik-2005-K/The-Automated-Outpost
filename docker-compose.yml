version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: outpost-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: outpost-backend
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    restart: unless-stopped
    volumes:
      - ./backend:/app   # hot-reload in dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: outpost-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
    volumes:
      - ./frontend/src:/app/src  # hot-reload in dev
